<body>

        <input type="radio" style="margin-left: 15px;" name="xmtype" value="zhsl" onchange="chxmtype()">韶山灌区、引江济淮-智慧水利平台V4.0

</body>
<script type="text/javascript">
    var level = 8;
    var xmtype = "typt";
    const tyfw = [
     
    ];

    const shy = [
     
    ];
    const zhsl = [

    const featurePoints = [
        
    ];

    //操作
    const opt = [
        "数据配置",
        "代码更新",
        "逻辑调整",
        "优化",
        "规则修改",
        "修订",
        "变更",
        "需求开发",
       "模块重构",
       "接口开发",
       "数据处理",
       "前端集成",
       "BUG修复",
       "性能优化",
       "代码优化",
       "安全加固",
       "单元测试",
       "集成测试",
       "部署发布",
       "版本管理",
       "技术调研",
       "方案设计",
       "文档输出",
       "并发编程",
       "代码审查",
       "应急处理",
       "BUG处理",
    ]

//执行
    function run() {
        console.log("运行...")
        let f = []
        let h = splitNumberIntoFiveParts(level);
        if (xmtype == "typt") {

            f = [...tyfw];
        }else if (xmtype == "slhy") {

            f = [...shy];
        }else if (xmtype == "zhsl") {

            f = [...zhsl];
        }
        let o = [...opt]
        let str = "";
        for (let i = 0; i < h.length; i++) {
            let ii = Math.floor(Math.random() * f.length)
            let jj = Math.floor(Math.random() * o.length)
            str += (i + 1) + "、" + f[ii] + "功能" + o[jj] + "，已完成100%，" + h[i] + "h。\n";
            f.splice(ii, 1);
            o.splice(jj, 1);
        }
        console.log(str)
        document.getElementById("sql").innerHTML = "";
        document.getElementById("sql").innerHTML = str;
    }

    run();

    //改变时间
    function chtype() {
        for (var i = 0; i < document.getElementsByName("level").length; i++) {
            if (document.getElementsByName("level")[i].checked) {
                level = document.getElementsByName("level")[i].value;
            }
        }

        console.log("level=" + level)
    }
    //改变项目名称
    function chxmtype() {
        for (var i = 0; i < document.getElementsByName("xmtype").length; i++) {
            if (document.getElementsByName("xmtype")[i].checked) {
                xmtype = document.getElementsByName("xmtype")[i].value;
            }
        }

        console.log("xmtype=" + xmtype)
    }


    function splitNumberIntoFiveParts(n) {
        // 初始化一个数组，用于存储拆分后的4个部分
        const parts = [];
        let remaining = n;

        // 生成4个随机数，确保它们的和不超过N，并且每个部分至少为0.5，且是0.5的倍数
        for (let i = 0; i < 3; i++) {
            // 计算最小和最大可能的随机数
            const min = 0.5;
            const max = remaining - (4 - i) * min; // 确保剩下的部分至少为0.5

            // 生成一个随机数，范围在min到max之间，并且是0.5的倍数
            const random = Math.random() * (max - min) + min;
            const part = Math.round(random * 2) / 2; // 确保是0.5的倍数
            parts.push(part);
            remaining -= part;
        }

        // 最后一个部分就是剩余的数值，确保是0.5的倍数
        const lastPart = Math.round(remaining * 2) / 2;
        parts.push(lastPart);

        return parts;
    }
    function copy() {

        var element = document.getElementById('sql');
        selectText(element);
        copyTextToClipboard(document.getElementById("sql").value);
    }

    function selectText(node) {
        if (window.getSelection && document.createRange) {
            var selection = window.getSelection();
            var range = document.createRange();
            range.selectNodeContents(node);
            selection.removeAllRanges();
            selection.addRange(range);
        } else if (document.body.createTextRange) { // 支持 IE < 9
            var textRange = document.body.createTextRange();
            textRange.moveToElementText(node);
            textRange.select();
        }
    }


    // 确保调用此函数的事件是由用户触发的，例如点击事件
    function copyTextToClipboard(text) {
        if (!navigator.clipboard) {
            console.error('Clipboard API not supported');
            return;
            fallbackCopy(text);
        }
        navigator.clipboard.writeText(text).then(function () {
            console.log('Text copied to clipboard');
        }, function (err) {
            console.error('Could not copy text: ', err);
            // 降级方案
            fallbackCopy(text);
        }).catch(() => {
            // 降级方案
            fallbackCopy(text);
        });;
    }
    function fallbackCopy(text) {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();

        try {
            document.execCommand('copy');
            console.log('复制成功');
        } catch (err) {
            console.log('请手动选择文本进行复制');
        }

        document.body.removeChild(textarea);
    }
</script>

</html>
